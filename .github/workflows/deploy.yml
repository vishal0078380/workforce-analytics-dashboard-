name: Workforce Dashboard CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-files
          path: build/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Run Lambda unit tests
        run: python3 tests/test_analytics.py

      - name: API Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://18sft68stl.execute-api.ap-south-1.amazonaws.com/prod/analytics)
          echo "API Status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ]; then
            echo "API health check failed with status $STATUS"
            exit 1
          fi
          echo "API is reachable"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Download build artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: build-files
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync build/ s3://workforce-dashboard-bucket --delete --region ap-south-1
          echo "Frontend deployed to S3"

      - name: Verify deployment
        run: |
          echo "Deployment complete"
          echo "Live URL: http://workforce-dashboard-bucket.s3-website.ap-south-1.amazonaws.com"
